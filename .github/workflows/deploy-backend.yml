name: Deploy Backend → HuggingFace

on:
  push:
    branches: [main]
    paths: ["backend/**"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install huggingface_hub
      - name: Deploy
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'EOF'
          import os
          from huggingface_hub import HfApi
          api = HfApi(token=os.environ["HF_TOKEN"])
          api.upload_folder(
              folder_path="backend",
              repo_id="Rafs-an09002/geoai-backend-test",
              repo_type="space",
              commit_message="deploy: backend v2.0.0",
              ignore_patterns=["__pycache__","*.pyc",".env","tests/"],
          )
          print("Deployed!")
          EOF